<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeCheck — Sentiment Markets</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        /* (your existing styles – unchanged) */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #0d0f14;
            color: #e2e8f0;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #2d3748;
            border-radius: 2px;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: .3;
            }
        }
        .live-dot {
            animation: pulse-dot 1.8s ease-in-out infinite;
        }

        .bar-fill {
            transition: width 0.7s cubic-bezier(.16, 1, .3, 1);
        }

        .market-card {
            transition: border-color 0.15s ease, background-color 0.15s ease;
        }
        .market-card:hover {
            border-color: #3b4a6b !important;
            background-color: #161b26 !important;
        }
        .market-card.expired {
            opacity: 0.7;
            background-color: #0a0c10 !important;
            border-color: #2a2f3a !important;
            pointer-events: none;
            cursor: default;
        }
        .market-card.expired .opt-btn {
            pointer-events: none;
            cursor: default;
            opacity: 0.6;
        }
        .market-card.expired .opt-btn:hover {
            background-color: transparent !important;
        }
        .market-card.expired .opt-selected {
            background-color: rgba(99, 102, 241, 0.05) !important;
            border-color: #4a5568 !important;
        }
        .market-card.expired .live-badge {
            background: #2d3748 !important;
            color: #9ca3af !important;
            border-color: #3a4455 !important;
        }
        .market-card.expired .expiry-timer {
            color: #6b7280 !important;
        }

        .opt-btn {
            transition: all 0.15s ease;
        }
        .opt-btn:hover {
            background-color: rgba(99, 102, 241, 0.08);
        }

        .flash-update {
            animation: flashRow 0.7s ease;
        }
        @keyframes flashRow {
            0% {
                background-color: rgba(99, 102, 241, 0.12);
            }
            100% {
                background-color: transparent;
            }
        }

        .tab-btn.active {
            color: #fff;
            border-bottom: 2px solid #6366f1;
        }
        .tab-btn {
            border-bottom: 2px solid transparent;
        }

        .pill-general {
            background: rgba(99, 102, 241, 0.12);
            color: #818cf8;
            border-color: rgba(99, 102, 241, 0.2);
        }
        .pill-sports {
            background: rgba(16, 185, 129, 0.10);
            color: #34d399;
            border-color: rgba(16, 185, 129, 0.2);
        }
        .pill-finance {
            background: rgba(245, 158, 11, 0.10);
            color: #fbbf24;
            border-color: rgba(245, 158, 11, 0.2);
        }
        .pill-politics {
            background: rgba(239, 68, 68, 0.10);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.2);
        }
        .pill-tragedy {
            background: rgba(156, 163, 175, 0.10);
            color: #9ca3af;
            border-color: rgba(156, 163, 175, 0.2);
        }

        .opt-selected {
            background-color: rgba(99, 102, 241, 0.10) !important;
            border-color: #6366f1 !important;
        }

        .pm-input {
            background: #161b26;
            border: 1px solid #2d3748;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 13px;
            padding: 8px 12px;
            width: 100%;
            outline: none;
            transition: border-color 0.15s;
        }
        .pm-input::placeholder {
            color: #4a5568;
        }
        .pm-input:focus {
            border-color: #6366f1;
        }
        select.pm-input option {
            background: #1a2035;
        }

        .bar-track {
            background: #1e2533;
            border-radius: 2px;
            height: 3px;
            overflow: hidden;
        }
        .volume-chip {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: #64748b;
        }

        @keyframes shimmer {
            0% {
                opacity: .4
            }
            50% {
                opacity: .8
            }
            100% {
                opacity: .4
            }
        }
        .skeleton {
            animation: shimmer 1.5s ease-in-out infinite;
            background: #1e2533;
            border-radius: 6px;
        }
    </style>
</head>

<body class="min-h-screen">

    <!-- TOP NAV -->
    <nav class="border-b border-[#1e2533] bg-[#0d0f14] sticky top-0 z-50">
        <div class="max-w-[1200px] mx-auto px-4 h-[52px] flex items-center justify-between gap-6">
            <div class="flex items-center gap-3 shrink-0">
                <div class="w-7 h-7 rounded-md bg-indigo-600 flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                </div>

            <div class="flex items-center gap-0 h-full">
                <button class="tab-btn active px-4 h-full text-[13px] font-medium text-slate-200 tracking-tight">Sentiment Markets</button>
            </div>

            <div class="flex items-center gap-4 shrink-0">
                <div class="flex items-center gap-2">

                    <span id="liveLabel" class="text-[12px] text-slate-400 font-medium">Connecting…</span>

    <div class="max-w-[1200px] mx-auto px-4 py-6">

        <div id="errorBanner" class="hidden mb-4 flex items-start gap-2.5 bg-rose-950/30 border border-rose-500/30 rounded-lg px-4 py-3 text-[12px] text-rose-300"></div>

        <div id="publicView">
            <div id="topicsContainer" class="grid grid-cols-1 gap-4">
                <div class="skeleton h-48 w-full"></div>
                <div class="skeleton h-48 w-full"></div>
                <div class="skeleton h-48 w-full"></div>
            </div>
            <div id="archiveSection" class="hidden mt-10">
                <div class="flex items-center gap-2 mb-4">
                    <svg class="w-3.5 h-3.5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span class="text-[11px] font-semibold uppercase tracking-widest text-slate-500">Archived</span>
                </div>
                <div id="archiveList" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
            </div>
        </div>

    </div>

    <footer class="border-t border-[#1e2533] mt-16 py-5 text-center text-[11px] text-slate-600">
        © 2026 VibeCheck · An Aethelwine Homes (Pty) Ltd product
    </footer>

    <script>
        // ============================================================
        // SUPABASE CONFIG
        // ============================================================
        const SUPABASE_URL = 'https://jvtlpjzwgnwfjorxmpew.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_mGPKCjbNN5Y-Q75yZA8PUg_n5Wikz_F';
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================================
        // HELPERS – parse bigint date (YYYYMMDDHHMM) to Date
        // ============================================================
        function parseDateNum(num) {
            const s = num.toString();
            return new Date(
                parseInt(s.slice(0, 4)),
                parseInt(s.slice(4, 6)) - 1,
                parseInt(s.slice(6, 8)),
                parseInt(s.slice(8, 10)),
                parseInt(s.slice(10, 12))
            );
        }

        function getNowNum() {
            const now = new Date();
            return parseInt(
                now.getFullYear().toString() +
                String(now.getMonth() + 1).padStart(2, '0') +
                String(now.getDate()).padStart(2, '0') +
                String(now.getHours()).padStart(2, '0') +
                String(now.getMinutes()).padStart(2, '0')
            );
        }

        // ============================================================
        // ICONS & CONSTANTS (unchanged)
        // ============================================================
        const ICONS = {
            sun: '<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>',
            zap: '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>',
            moon: '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>',
            'cloud-rain': '<path d="M20 16.2A4.5 4.5 0 0 0 17.5 8h-1.8A7 7 0 1 0 4 14.9"></path><path d="M16 14v6M8 14v6M12 16v6"></path>',
            flame: '<path d="M8.5 14.5A2.5 2.5 0 0 0 11 17a2.5 2.5 0 0 0 2.5-2.5c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7.5 7.5 0 1 1-15 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2 1z"></path>',
            sunrise: '<path d="M12 2v7"></path><path d="m4.93 10.93 1.41 1.41"></path><path d="M2 18h2"></path><path d="M20 18h2"></path><path d="m19.07 10.93-1.41 1.41"></path><path d="M22 22H2"></path><path d="m16 6-4 4-4-4"></path><path d="M16 18a4 4 0 0 0-8 0"></path>',
            ghost: '<path d="M9 10h.01M15 10h.01M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"></path>',
            heart: '<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"></path>',
            trophy: '<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path>',
            'trending-down': '<polyline points="22 17 13.5 8.5 8.5 13.5 2 7"></polyline><polyline points="16 17 22 17 22 11"></polyline>',
            'trending-up': '<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline>',
            wallet: '<path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"></path><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"></path><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"></path>',
        };

        function renderIcon(name) {
            return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5">${ICONS[name] || ICONS.sun}</svg>`;
        }

        const COLOR_MAP = {
            emerald: { text: 'text-emerald-400', bar: 'bg-emerald-500', dot: 'bg-emerald-400' },
            amber: { text: 'text-amber-400', bar: 'bg-amber-500', dot: 'bg-amber-400' },
            indigo: { text: 'text-indigo-400', bar: 'bg-indigo-500', dot: 'bg-indigo-400' },
            blue: { text: 'text-blue-400', bar: 'bg-blue-500', dot: 'bg-blue-400' },
            rose: { text: 'text-rose-400', bar: 'bg-rose-500', dot: 'bg-rose-400' },
            teal: { text: 'text-teal-400', bar: 'bg-teal-500', dot: 'bg-teal-400' },
            slate: { text: 'text-slate-400', bar: 'bg-slate-500', dot: 'bg-slate-400' },
            pink: { text: 'text-pink-400', bar: 'bg-pink-500', dot: 'bg-pink-400' },
            violet: { text: 'text-violet-400', bar: 'bg-violet-500', dot: 'bg-violet-400' },
        };

        const CATEGORY_LABEL = { general: 'General', sports: 'Sports', tragedy: 'Crisis', finance: 'Finance',
        politics: 'Politics' };
        const CATEGORY_PILL = { general: 'pill-general', sports: 'pill-sports', tragedy: 'pill-tragedy',
            finance: 'pill-finance', politics: 'pill-politics' };

        // ============================================================
        // USER ID
        // ============================================================
        const USER_ID = (() => {
            let id = localStorage.getItem('vibecheck_user_id');
            if (!id) { id = 'user-' + Math.random().toString(36).slice(2, 10);
                localStorage.setItem('vibecheck_user_id', id); }
            return id;
        })();

        // ============================================================
        // STATE
        // ============================================================
        let state = {
            topics: {},
            voteCounts: {},
            userVotes: {},
        };

        // ============================================================
        // ERROR / STATUS
        // ============================================================
        function showError(msg) {
            const el = document.getElementById('errorBanner');
            el.textContent = '⚠ ' + msg;
            el.classList.remove('hidden');
        }

        function hideError() { document.getElementById('errorBanner').classList.add('hidden'); }

        function setLiveStatus(status) {
            const dot = document.getElementById('liveIndicator');
            const label = document.getElementById('liveLabel');
            if (status === 'live') {
                dot.className = 'live-dot w-1.5 h-1.5 rounded-full bg-emerald-400 inline-block';
                label.textContent = 'Live';
            } else if (status === 'connecting') {
                dot.className = 'w-1.5 h-1.5 rounded-full bg-amber-400 inline-block';
                label.textContent = 'Connecting…';
            } else {
                dot.className = 'w-1.5 h-1.5 rounded-full bg-rose-400 inline-block';
                label.textContent = 'Offline';
            }
        }

        // ============================================================
        // LOAD DATA
        // ============================================================
        async function loadData() {
            setLiveStatus('connecting');

            const { data: topics, error: tErr } = await sb
                .from('topics')
                .select('*, options(*)')
                .order('created_at', { ascending: false });

            if (tErr) { showError('Could not load markets: ' + tErr.message);
                setLiveStatus('error'); return; }

            const { data: counts, error: cErr } = await sb.from('vote_counts').select('*');
            if (cErr) { showError('Could not load vote counts: ' + cErr.message);
                setLiveStatus('error'); return; }

            const { data: myVotes, error: vErr } = await sb
                .from('user_votes')
                .select('topic_id, option_id')
                .eq('user_id', USER_ID);
            if (vErr) { showError('Could not load your votes: ' + vErr.message); }

            state.topics = {};
            state.voteCounts = {};
            state.userVotes = {};

            (topics || []).forEach(t => {
                state.topics[t.id] = { ...t, options: t.options || [] };
                state.voteCounts[t.id] = {};
            });

            (counts || []).forEach(c => {
                if (state.voteCounts[c.topic_id]) {
                    state.voteCounts[c.topic_id][c.option_id] = c.count;
                }
            });

            (myVotes || []).forEach(v => { state.userVotes[v.topic_id] = v.option_id; });

            hideError();
            setLiveStatus('live');
            renderPublic();
            subscribeToUpdates();
            updateTimers();
            setInterval(updateTimers, 1000);
        }

        // ============================================================
        // REALTIME SUBSCRIPTION
        // ============================================================
        function subscribeToUpdates() {
            sb.channel('vote_counts_changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'vote_counts' }, payload => {
                    const row = payload.new || {};
                    const { topic_id, option_id, count } = row;
                    if (!topic_id || !option_id) return;
                    if (!state.voteCounts[topic_id]) state.voteCounts[topic_id] = {};
                    state.voteCounts[topic_id][option_id] = count;
                    updateTopicUI(topic_id, [option_id]);
                })
                .subscribe(status => {
                    if (status === 'SUBSCRIBED') setLiveStatus('live');
                });
        }

        // ============================================================
        // VOTE HANDLER
        // ============================================================
        async function handleVote(topicId, optionId) {
            const topic = state.topics[topicId];
            const nowNum = getNowNum();

            if (topic && topic.expires_at && topic.expires_at <= nowNum) {
                alert("This poll has expired and is closed for voting.");
                return;
            }

            const previous = state.userVotes[topicId] || null;

            if (previous === optionId) {
                state.userVotes[topicId] = null;
                state.voteCounts[topicId][optionId] = Math.max(0, (state.voteCounts[topicId][optionId] || 0) - 1);
            } else {
                if (previous) {
                    state.voteCounts[topicId][previous] = Math.max(0, (state.voteCounts[topicId][previous] || 0) - 1);
                }
                state.voteCounts[topicId][optionId] = (state.voteCounts[topicId][optionId] || 0) + 1;
                state.userVotes[topicId] = optionId;
            }

            updateTopicUI(topicId, [optionId, previous].filter(Boolean));

            try {
                if (previous === optionId) {
                    await sb.from('user_votes').delete().eq('user_id', USER_ID).eq('topic_id', topicId);
                    await sb.rpc('decrement_vote', { p_topic_id: topicId, p_option_id: optionId });
                } else {
                    if (previous) {
                        await sb.rpc('decrement_vote', { p_topic_id: topicId, p_option_id: previous });
                    }
                    await sb.from('user_votes').upsert({ user_id: USER_ID, topic_id: topicId, option_id: optionId });
                    await sb.rpc('increment_vote', { p_topic_id: topicId, p_option_id: optionId });
                }
            } catch (error) {
                console.error("Vote failed, reverting UI:", error);
            }
        }

        // ============================================================
        // BUILD OPTION ROW
        // ============================================================
        function buildCard(topicId, option, expired) {
            const c = COLOR_MAP[option.color] || COLOR_MAP.slate;
            const row = document.createElement('button');
            row.type = 'button';
            row.id = `card-${topicId}-${option.id}`;
            row.className = 'opt-btn w-full text-left flex items-center gap-3 px-4 py-3 rounded-lg border border-transparent';
            if (!expired) {
                row.addEventListener('click', () => handleVote(topicId, option.id));
            } else {
                row.disabled = true;
            }
            row.innerHTML = `
            <div class="w-7 h-7 rounded-md bg-[#1a2035] flex items-center justify-center shrink-0 ${c.text}">
              ${renderIcon(option.icon)}
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between mb-1.5">
                <span class="text-[13px] font-medium text-slate-200 truncate pr-3 leading-tight">${option.label}</span>
                <span class="pct-value text-[13px] font-semibold ${c.text} shrink-0 tabular-nums">0%</span>
              </div>
              <div class="bar-track w-full">
                <div class="bar-fill h-full ${c.bar} opacity-70" style="width:0%"></div>
              </div>
            </div>
            <div class="vote-count volume-chip shrink-0 w-[64px] text-right tabular-nums">0</div>
            <div class="selected-dot w-1.5 h-1.5 rounded-full ${c.dot} shrink-0 opacity-0 transition-all duration-200"></div>
          `;
            return row;
        }

        // ============================================================
        // BUILD MARKET CARD
        // ============================================================
        function buildTopicSection(topic, expired) {
            const wrap = document.createElement('div');
            wrap.id = `topic-${topic.id}`;
            const pillClass = CATEGORY_PILL[topic.category] || 'pill-general';
            const badgeLabel = CATEGORY_LABEL[topic.category] || topic.category;

            const cardClass = `market-card bg-[#111520] border border-[#1e2533] rounded-xl overflow-hidden ${expired ? 'expired' : ''}`;
            wrap.className = cardClass;

            const badgeHtml = expired ?
                `<span class="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded border live-badge bg-[#2d3748] text-[#9ca3af] border-[#3a4455]">Closed</span>` :
                `<span class="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded border ${pillClass}">${badgeLabel}</span>`;

            wrap.innerHTML = `
            <div class="px-5 pt-4 pb-3 border-b border-[#1a2030]">
              <div class="flex items-center justify-between gap-3 mb-2.5">
                ${badgeHtml}
                <div class="flex items-center gap-1.5">
                  <span class="w-1.5 h-1.5 rounded-full ${expired ? 'bg-slate-600' : 'bg-indigo-500 animate-pulse'}"></span>
                  <span class="text-[10px] ${expired ? 'text-slate-500' : 'text-slate-500'} font-medium">${expired ? 'Closed' : 'Live'}</span>
                </div>
              </div>
              <h2 class="text-[14px] font-semibold text-white leading-snug">${topic.title}</h2>
              <div id="timer-${topic.id}" class="text-[10px] ${expired ? 'text-slate-500' : 'text-amber-500'} font-mono mt-2 font-bold expiry-timer"></div>
            </div>
            <div class="px-2 py-2 space-y-0.5" id="grid-${topic.id}"></div>
            <div class="px-5 py-3 border-t border-[#1a2030] flex items-center justify-between">
              <span class="text-[11px] text-slate-500">
                <span class="topic-total font-semibold text-slate-300">0</span> responses
              </span>
              <span class="text-[11px] ${expired ? 'text-slate-600' : 'text-slate-500'}">${expired ? 'Voting closed' : 'Tap to respond'}</span>
            </div>
          `;

            const grid = wrap.querySelector(`#grid-${topic.id}`);
            (topic.options || []).forEach(opt => grid.appendChild(buildCard(topic.id, opt, expired)));
            return wrap;
        }

        // ============================================================
        // RENDER PUBLIC – SORTED LATEST FIRST (using parseDateNum)
        // ============================================================
        function renderPublic() {
            const container = document.getElementById('topicsContainer');
            const archiveList = document.getElementById('archiveList');
            const archiveSection = document.getElementById('archiveSection');
            container.innerHTML = '';
            archiveList.innerHTML = '';

            const topics = Object.values(state.topics);
            const nowNum = getNowNum();

            // Active topics (status='active') – sort by created_at descending (latest first)
            const activeTopics = topics
                .filter(t => t.status === 'active')
                .sort((a, b) => {
                    const dateA = parseDateNum(a.created_at);
                    const dateB = parseDateNum(b.created_at);
                    return dateB - dateA; // descending = newest first
                });

            const archivedTopics = topics.filter(t => t.status === 'archived');

            if (activeTopics.length === 0) {
                container.innerHTML =
                `<div class="text-center py-16 text-slate-500 text-[13px]">No active markets yet. Create one in Admin.</div>`;
            } else {
                activeTopics.forEach(t => {
                    const expired = t.expires_at && t.expires_at <= nowNum;
                    container.appendChild(buildTopicSection(t, expired));
                });
                // Update UI for each
                activeTopics.forEach(t => updateTopicUI(t.id));
            }

            if (archivedTopics.length) {
                archiveSection.classList.remove('hidden');
                archivedTopics.forEach(t => {
                    const total = Object.values(state.voteCounts[t.id] || {}).reduce((a, b) => a + b, 0);
                    const row = document.createElement('div');
                    row.className =
                        'bg-[#111520] border border-[#1e2533] rounded-lg px-4 py-3 text-[12px] text-slate-400 flex items-center justify-between';
                    row.innerHTML =
                        `<span class="font-medium text-slate-300 truncate pr-4">${t.title}</span><span class="text-slate-500 tabular-nums shrink-0">${total.toLocaleString()} responses</span>`;
                    archiveList.appendChild(row);
                });
            } else {
                archiveSection.classList.add('hidden');
            }

            updateGrandTotal();
        }

        // ============================================================
        // UPDATE GRAND TOTAL
        // ============================================================
        function updateGrandTotal() {
            const el = document.getElementById('total');
            if (!el) return;
            let total = 0;
            Object.values(state.topics).forEach(t => {
                if (t.status === 'active') {
                    const counts = state.voteCounts[t.id] || {};
                    total += Object.values(counts).reduce((a, b) => a + b, 0);
                }
            });
            el.textContent = total.toLocaleString();
        }

        // ============================================================
        // UPDATE TOPIC UI
        // ============================================================
        function updateTopicUI(topicId, changedOptionIds = []) {
            const topic = state.topics[topicId];
            if (!topic) return;

            const counts = state.voteCounts[topicId] || {};
            const total = Object.values(counts).reduce((a, b) => a + b, 0);
            const myVote = state.userVotes[topicId] || null;
            const nowNum = getNowNum();
            const expired = topic.expires_at && topic.expires_at <= nowNum;

            const section = document.getElementById(`topic-${topicId}`);
            if (section) {
                const el = section.querySelector('.topic-total');
                if (el) el.textContent = total.toLocaleString();
            }

            (topic.options || []).forEach(option => {
                const row = document.getElementById(`card-${topicId}-${option.id}`);
                if (!row) return;

                const count = counts[option.id] || 0;
                const pct = total > 0 ? (count / total * 100) : 0;

                const pctEl = row.querySelector('.pct-value');
                if (pctEl) pctEl.textContent = pct.toFixed(1) + '%';

                const countEl = row.querySelector('.vote-count');
                if (countEl) countEl.textContent = count.toLocaleString();

                const barEl = row.querySelector('.bar-fill');
                if (barEl) barEl.style.width = pct + '%';

                const dot = row.querySelector('.selected-dot');
                const isActive = myVote === option.id;

                if (dot) {
                    if (isActive) {
                        row.classList.add('opt-selected');
                        row.classList.remove('border-transparent');
                        dot.classList.remove('opacity-0');
                        dot.classList.add('opacity-100');
                    } else {
                        row.classList.remove('opt-selected');
                        row.classList.add('border-transparent');
                        dot.classList.add('opacity-0');
                        dot.classList.remove('opacity-100');
                    }
                }

                if (changedOptionIds.includes(option.id)) {
                    row.classList.add('flash-update');
                    setTimeout(() => row.classList.remove('flash-update'), 700);
                }
            });

            updateGrandTotal();
        }

        // ============================================================
        // COUNTDOWN TIMERS – using parseDateNum
        // ============================================================
        function updateTimers() {
            const now = new Date();
            const nowNum = getNowNum();
            Object.values(state.topics).forEach(t => {
                if (t.expires_at) {
                    const expiryDate = parseDateNum(t.expires_at);
                    const diff = expiryDate - now;
                    const el = document.getElementById(`timer-${t.id}`);
                    if (el) {
                        if (diff > 0) {
                            const mins = Math.floor(diff / 60000);
                            const secs = Math.floor((diff % 60000) / 1000);
                            el.innerText = `Ends in: ${mins}m ${secs}s`;
                        } else {
                            el.innerText = 'Expired';
                            // Apply expired state if not already done
                            const card = document.getElementById(`topic-${t.id}`);
                            if (card && !card.classList.contains('expired') && t.status === 'active') {
                                // Re-render the card to apply expired styles and disable buttons
                                // We can just re-render the entire feed, but that would reset flash updates.
                                // Instead, we can manually apply the expired class and disable buttons.
                                card.classList.add('expired');
                                const badge = card.querySelector('.live-badge');
                                if (badge) {
                                    badge.textContent = 'Closed';
                                    badge.className = 'text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded border live-badge bg-[#2d3748] text-[#9ca3af] border-[#3a4455]';
                                }
                                const statusDot = card.querySelector('.w-1.5.h-1.5.rounded-full');
                                if (statusDot) {
                                    statusDot.className = 'w-1.5 h-1.5 rounded-full bg-slate-600';
                                }
                                const statusLabel = card.querySelector('.text-[10px].text-slate-500.font-medium');
                                if (statusLabel) statusLabel.textContent = 'Closed';
                                const footerMsg = card.querySelector('.px-5.py-3 .text-slate-500:last-child');
                                if (footerMsg) footerMsg.textContent = 'Voting closed';
                                const buttons = card.querySelectorAll('.opt-btn');
                                buttons.forEach(btn => {
                                    btn.style.pointerEvents = 'none';
                                    btn.style.cursor = 'default';
                                    btn.disabled = true;
                                });
                            }
                        }
                    }
                }
            });
        }

        // ============================================================
        // BOOT
        // ============================================================
        loadData();
    </script>
</body>
</html>
