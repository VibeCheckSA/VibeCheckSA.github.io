const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// CONSTANTS
// ============================================================
const ICONS = {

  'trending-down': '<polyline points="22 17 13.5 8.5 8.5 13.5 2 7"></polyline><polyline points="16 17 22 17 22 11"></polyline>',

  wallet: '<path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"></path><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"></path><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"></path>',

function renderIcon(name) {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5">${ICONS[name] || ICONS.sun}</svg>`;
}
const ICON_OPTIONS = Object.keys(ICONS);

const COLOR_MAP = {
  emerald: { text: 'text-emerald-400', bar: 'bg-emerald-500', dot: 'bg-emerald-400' },
  amber:   { text: 'text-amber-400',   bar: 'bg-amber-500',   dot: 'bg-amber-400'   },
  indigo:  { text: 'text-indigo-400',  bar: 'bg-indigo-500',  dot: 'bg-indigo-400'  },
  blue:    { text: 'text-blue-400',    bar: 'bg-blue-500',    dot: 'bg-blue-400'    },
  rose:    { text: 'text-rose-400',    bar: 'bg-rose-500',    dot: 'bg-rose-400'    },
  teal:    { text: 'text-teal-400',    bar: 'bg-teal-500',    dot: 'bg-teal-400'    },
  slate:   { text: 'text-slate-400',   bar: 'bg-slate-500',   dot: 'bg-slate-400'   },
  pink:    { text: 'text-pink-400',    bar: 'bg-pink-500',    dot: 'bg-pink-400'    },
  violet:  { text: 'text-violet-400',  bar: 'bg-violet-500',  dot: 'bg-violet-400'  },
};
const COLOR_OPTIONS = Object.keys(COLOR_MAP);

const CATEGORY_LABEL = { general: 'General', sports: 'Sports', tragedy: 'Crisis', finance: 'Finance', politics: 'Politics' };
const CATEGORY_PILL  = { general: 'pill-general', sports: 'pill-sports', tragedy: 'pill-tragedy', finance: 'pill-finance', politics: 'pill-politics' };

// ============================================================
// USER ID (persistent per browser)
// ============================================================
const USER_ID = (() => {
  let id = localStorage.getItem('vibecheck_user_id');
  if (!id) { id = 'user-' + Math.random().toString(36).slice(2, 10); localStorage.setItem('vibecheck_user_id', id); }
  return id;
})();

// ============================================================
// IN-MEMORY STATE (loaded from Supabase)
// ============================================================
let state = {
  topics: {},      // { [topicId]: { id, title, category, status, created_at, ends_at, options: [] } }
  voteCounts: {},  // { [topicId]: { [optionId]: count } }
  userVotes: {},   // { [topicId]: optionId }
};

// ============================================================
// ERROR DISPLAY
// ============================================================
function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = '⚠ ' + msg;
  el.classList.remove('hidden');
}
function hideError() { document.getElementById('errorBanner').classList.add('hidden'); }

// ============================================================
// LOAD ALL DATA FROM SUPABASE
// ============================================================
async function loadData() {
  setLiveStatus('connecting');

  // 1. Load topics + options in one joined query
  const { data: topics, error: tErr } = await sb
    .from('topics')
    .select('*, options(*)')
    .order('created_at', { ascending: false });

  if (tErr) { showError('Could not load markets: ' + tErr.message); setLiveStatus('error'); return; }

  // 2. Load vote counts
  const { data: counts, error: cErr } = await sb.from('vote_counts').select('*');
  if (cErr) { showError('Could not load vote counts: ' + cErr.message); setLiveStatus('error'); return; }

  // 3. Load this user's votes
  const { data: myVotes, error: vErr } = await sb
    .from('user_votes')
    .select('topic_id, option_id')
    .eq('user_id', USER_ID);
  if (vErr) { showError('Could not load your votes: ' + vErr.message); }

  // Build state
  state.topics = {};
  state.voteCounts = {};
  state.userVotes = {};

  topics.forEach(t => {
    state.topics[t.id] = { ...t, options: t.options || [] };
    state.voteCounts[t.id] = {};
  });

  counts.forEach(c => {
    if (state.voteCounts[c.topic_id]) {
      state.voteCounts[c.topic_id][c.option_id] = c.count;
    }
  });

  (myVotes || []).forEach(v => { state.userVotes[v.topic_id] = v.option_id; });

  hideError();
  setLiveStatus('live');
  renderPublic();
//  renderAdminTopicsList();
  subscribeToUpdates();
}

// ============================================================
// REALTIME SUBSCRIPTION
// ============================================================
function subscribeToUpdates() {
  sb.channel('vote_counts_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'vote_counts' }, payload => {
      const { topic_id, option_id, count } = payload.new || {};
      if (!topic_id || !option_id) return;
      if (!state.voteCounts[topic_id]) state.voteCounts[topic_id] = {};
      state.voteCounts[topic_id][option_id] = count;
      updateTopicUI(topic_id, [option_id]);
    })
    .subscribe(status => {
      if (status === 'SUBSCRIBED') setLiveStatus('live');
    });
}

function setLiveStatus(status) {
  const dot = document.getElementById('liveIndicator');
  const label = document.getElementById('liveLabel');
  if (status === 'live') {
    dot.className = 'live-dot w-1.5 h-1.5 rounded-full bg-emerald-400 inline-block';
    label.textContent = 'Live';
  } else if (status === 'connecting') {
    dot.className = 'w-1.5 h-1.5 rounded-full bg-amber-400 inline-block';
    label.textContent = 'Connecting…';
  } else {
    dot.className = 'w-1.5 h-1.5 rounded-full bg-rose-400 inline-block';
    label.textContent = 'Offline';
  }
}

// ============================================================
// VOTE HANDLER
// ============================================================
async function handleVote(topicId, optionId) {
  const previous = state.userVotes[topicId] || null;

  // Optimistic UI update
  if (previous === optionId) {
    // Unvote
    state.userVotes[topicId] = null;
    state.voteCounts[topicId][optionId] = Math.max(0, (state.voteCounts[topicId][optionId] || 0) - 1);
  } else {
    if (previous) {
      state.voteCounts[topicId][previous] = Math.max(0, (state.voteCounts[topicId][previous] || 0) - 1);
    }
    state.voteCounts[topicId][optionId] = (state.voteCounts[topicId][optionId] || 0) + 1;
    state.userVotes[topicId] = optionId;
  }
  updateTopicUI(topicId, [optionId, previous].filter(Boolean));

  // Persist to Supabase
  if (previous === optionId) {
    // Unvote: remove user_votes row, decrement count
    await sb.from('user_votes').delete().eq('user_id', USER_ID).eq('topic_id', topicId);
    await sb.rpc('decrement_vote', { p_topic_id: topicId, p_option_id: optionId });
  } else {
    if (previous) {
      await sb.rpc('decrement_vote', { p_topic_id: topicId, p_option_id: previous });
    }
    // Upsert user vote
    await sb.from('user_votes').upsert({ user_id: USER_ID, topic_id: topicId, option_id: optionId });
    // Increment new option
    await sb.rpc('increment_vote', { p_topic_id: topicId, p_option_id: optionId });
  }
}

// ============================================================
// BUILD OPTION ROW
// ============================================================
function buildCard(topicId, option) {
  const c = COLOR_MAP[option.color] || COLOR_MAP.slate;
  const row = document.createElement('button');

  row.className = 'opt-btn w-full text-left flex items-center gap-3 px-4 py-3 rounded-lg border border-transparent';
  row.addEventListener('click', () => handleVote(topicId, option.id));
  row.innerHTML = `
    <div class="w-7 h-7 rounded-md bg-[#1a2035] flex items-center justify-center shrink-0 ${c.text}">
      ${renderIcon(option.icon)}
    </div>
    <div class="flex-1 min-w-0">
      <div class="flex items-center justify-between mb-1.5">
        <span class="text-[13px] font-medium text-slate-200 truncate pr-3 leading-tight">${option.label}</span>
        <span class="pct-value text-[13px] font-semibold ${c.text} shrink-0 tabular-nums">0%</span>
      </div>
      <div class="bar-track w-full">
        <div class="bar-fill h-full ${c.bar} opacity-70" style="width:0%"></div>
      </div>
    </div>
    <div class="vote-count volume-chip shrink-0 w-[64px] text-right tabular-nums">0</div>
    <div class="selected-dot w-1.5 h-1.5 rounded-full ${c.dot} shrink-0 opacity-0 transition-all duration-200"></div>
  `;
  return row;
}

// BUILD MARKET CARD

        <div class="flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></span>
          <span class="text-[10px] text-slate-500 font-medium">Live</span>
        </div>
      </div>

      <span class="text-[11px] text-slate-500">Tap to respond</span>
    </div>
  `;
  const grid = wrap.querySelector(`#grid-${topic.id}`);
  topic.options.forEach(opt => grid.appendChild(buildCard(topic.id, opt)));

}

// ============================================================
// RENDER PUBLIC FEED
// ============================================================
function renderPublic() {
  const container = document.getElementById('topicsContainer');
  const archiveList = document.getElementById('archiveList');
  const archiveSection = document.getElementById('archiveSection');
  container.innerHTML = '';
  archiveList.innerHTML = '';

const topics = Object.values(state.topics);
  
  // Get current time in your YYYYMMDDHHMM format
  const now = parseInt(new Date().toISOString().replace(/[-T:.Z]/g, '').slice(0, 12));

  // Filter: Active if status is 'active' AND (no expiry OR not yet expired)
  const active = topics.filter(t => 
    t.status === 'active' && (!t.expires_at || t.expires_at > now)
  ).sort((a, b) => b.created_at - a.created_at);

  // Filter: Archived if status is 'archived' OR the time has passed
  const archived = topics.filter(t => 
    t.status === 'archived' || (t.expires_at && t.expires_at <= now)
  );

  if (active.length === 0) {
    container.innerHTML = `<div class="text-center py-16 text-slate-500 text-[13px]">No active markets yet. Create one in Admin.</div>`;
  } else {
    active.forEach(t => container.appendChild(buildTopicSection(t)));
    active.forEach(t => updateTopicUI(t.id));
  }

  if (archived.length) {
    archiveSection.classList.remove('hidden');
    archived.forEach(t => {
      const total = Object.values(state.voteCounts[t.id] || {}).reduce((a,b) => a+b, 0);
      const row = document.createElement('div');
      row.className = 'bg-[#111520] border border-[#1e2533] rounded-lg px-4 py-3 text-[12px] text-slate-400 flex items-center justify-between';
      row.innerHTML = `<span class="font-medium text-slate-300 truncate pr-4">${t.title}</span><span class="text-slate-500 tabular-nums shrink-0">${total.toLocaleString()} responses</span>`;
      archiveList.appendChild(row);
    });
  } else {
    archiveSection.classList.add('hidden');
  }
  updateGrandTotal();
}

function updateGrandTotal() {
  let total = 0;
  Object.values(state.topics).forEach(t => {
    if (t.status === 'active') total += Object.values(state.voteCounts[t.id] || {}).reduce((a,b) => a+b, 0);
  });
  document.getElementById('totalVotes').textContent = total.toLocaleString();
}

// ============================================================
// UPDATE OPTION UI
// ============================================================
function updateTopicUI(topicId, changedOptionIds = []) {
  const topic = state.topics[topicId];
  if (!topic) return;
  const counts = state.voteCounts[topicId] || {};
  const total = Object.values(counts).reduce((a,b) => a+b, 0);
  const myVote = state.userVotes[topicId] || null;

  const section = document.getElementById(`topic-${topicId}`);
  if (section) {
    const el = section.querySelector('.topic-total');
    if (el) el.textContent = total.toLocaleString();
  }

  topic.options.forEach(option => {
    const row = document.getElementById(`card-${topicId}-${option.id}`);
    if (!row) return;
    const c = COLOR_MAP[option.color] || COLOR_MAP.slate;
    const count = counts[option.id] || 0;
    const pct = total > 0 ? (count / total * 100) : 0;

    row.querySelector('.pct-value').textContent = pct.toFixed(1) + '%';
    row.querySelector('.vote-count').textContent = count.toLocaleString();
    row.querySelector('.bar-fill').style.width = pct + '%';

    const isActive = myVote === option.id;
    const dot = row.querySelector('.selected-dot');
    if (isActive) {
      row.classList.add('opt-selected');
      row.classList.remove('border-transparent');
      dot.classList.remove('opacity-0');
      dot.classList.add('opacity-100');
    } else {
      row.classList.remove('opt-selected');
      row.classList.add('border-transparent');
      dot.classList.add('opacity-0');
      dot.classList.remove('opacity-100');
    }

    if (changedOptionIds.includes(option.id)) {
      row.classList.add('flash-update');
      setTimeout(() => row.classList.remove('flash-update'), 700);
    }
  });
  updateGrandTotal();
}

// ============================================================

loadData();
</script>
